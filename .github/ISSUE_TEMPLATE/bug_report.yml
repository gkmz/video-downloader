name: Bug Report
description: Report a reproducible bug in VDD
title: "[Bug] "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail to reproduce the issue.

  - type: input
    id: version
    attributes:
      label: Version
      description: App version or commit hash
      placeholder: v1.4.0 / commit SHA
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Go version, architecture, and other relevant runtime info
      placeholder: |
        go version:
        arch:
        yt-dlp version:
        ffmpeg version:

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Screenshots
      description: Paste logs, stack traces, or screenshots if available
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and confirmed this is not a duplicate
          required: true
        - label: I can reproduce this issue on the latest main branch
          required: false
