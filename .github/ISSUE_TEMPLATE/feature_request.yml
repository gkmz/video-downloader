name: Feature Request
description: Propose an enhancement for VDD
title: "[Feature] "
labels:
  - enhancement
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: |
        When I ...
        I expect ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe your proposed behavior or API/UI change
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered

  - type: textarea
    id: scope
    attributes:
      label: Scope and Impact
      description: Which modules are affected? Any compatibility risks?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions
          required: true
        - label: This request describes a single concrete enhancement
          required: true
